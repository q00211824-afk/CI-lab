name: CI-Lab (Var 24)

# Триггер: запускать при каждом пуше в main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ------------------ 1. LINT ------------------
  lint:
    name: Lint with ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './src'
          severity: warning
          additional_files: '*.sh'

  # ------------------ 2. TEST ------------------
  test:
    name: Run BATS Tests
    runs-on: ubuntu-latest
    needs: lint               # тесты только после успешного линта
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run Tests
        run: bats tests/

  # ------------------ 3. BUILD ------------------
  build:
    name: Build Artifact (Syntax Check)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Проверка синтаксиса командой bash -n
      - name: Verify Script Syntax
        run: |
          echo "Verifying syntax of main.sh..."
          bash -n src/main.sh
          echo "Syntax verification passed!"

      # Сборка Docker-образа (чтобы показать артефакт)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: my-bash-app:latest
